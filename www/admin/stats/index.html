<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Statistiques Admin - Désiré VPN Connect</title>

<link rel="stylesheet" href="../admin.css">

</head>

<body>

<div class="dashboard">

<h1>📊 Statistiques Administrateur</h1>


<div class="card">
<h3>📥 Téléchargements totaux</h3>
<p id="totalDownloads">0</p>
</div>


<div class="card">
<h3>📅 Téléchargements aujourd'hui</h3>
<p id="todayDownloads">0</p>
</div>


<div class="card">
<h3>📆 Cette semaine</h3>
<p id="weekDownloads">0</p>
</div>


<div class="card">
<h3>📆 Ce mois</h3>
<p id="monthDownloads">0</p>
</div>


<div class="card">
<h3>⭐ VPN le plus utilisé</h3>
<p id="topVPN">Aucun</p>
</div>


<div class="card">
<h3>📂 Fichier le plus téléchargé</h3>
<p id="topFile">Aucun</p>
</div>


<div class="card">
<h3>👁️ Visites</h3>
<p id="visits">0</p>
</div>


<div class="card">
<h3>📲 Clics WhatsApp</h3>
<p id="whatsappClicks">0</p>
</div>


<div class="card">
<h3>⚠️ Signalements</h3>
<p id="reports">0</p>
</div>


<button onclick="history.back()">
⬅ Retour
</button>


</div>


<script src="stats.js"></script>

</body>

</html>
